<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friday Login</title>
    <link rel="stylesheet" href="./auth-ui.css" />
  </head>
  <body>
    <main class="card">
      <h1>Login</h1>
      <p>Uses gRPC `friday.core.rpc.AuthService/Login` from `libs/core/proto/hello.proto`.</p>
      <form id="login-form">
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div>
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit">Login</button>
      </form>
      <div id="status"></div>
      <pre id="output"></pre>
      <div class="row">
        <a href="./register.html">Need an account? Register</a>
        <a href="./index.html">Home</a>
      </div>
    </main>
    <script type="module" src="./login.js"></script>
  </body>
</html>
