<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Friday</title>
		<script type="importmap">
			{
				"imports": {
					"lit": "/node_modules/lit/index.js",
					"lit/": "/node_modules/lit/",
					"lit-element": "/node_modules/.pnpm/node_modules/lit-element/index.js",
					"lit-element/": "/node_modules/.pnpm/node_modules/lit-element/",
					"lit-html": "/node_modules/.pnpm/node_modules/lit-html/lit-html.js",
					"lit-html/": "/node_modules/.pnpm/node_modules/lit-html/",
					"@lit/reactive-element": "/node_modules/.pnpm/node_modules/@lit/reactive-element/reactive-element.js",
					"@lit/reactive-element/": "/node_modules/.pnpm/node_modules/@lit/reactive-element/"
				}
			}
		</script>
		<script>
			window.addEventListener("error", () => {
				document.body.innerHTML = "<main class=\"boot-error\">Frontend failed to load.</main>";
			});
			window.addEventListener("unhandledrejection", () => {
				document.body.innerHTML = "<main class=\"boot-error\">Frontend failed to load.</main>";
			});
		</script>
		<script type="module" src="/dist/main.js"></script>
		<style>
			body {
				margin: 0;
			}

			.boot,
			.boot-error {
				color: #172033;
				font: 16px system-ui, sans-serif;
				padding: 24px;
			}
		</style>
	</head>
	<body>
		<friday-app><main class="boot">Loading Friday...</main></friday-app>
	</body>
</html>
