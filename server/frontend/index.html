<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friday</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <!--
      Import map resolves bare specifiers used by the compiled TypeScript modules.
      Third-party packages resolve to esm.sh CDN; project components map to /components/.
    -->
    <script type="importmap">
      {
        "imports": {
          "lit": "https://esm.sh/lit@3.3.2",
          "lit/": "https://esm.sh/lit@3.3.2/",
          "@lit/reactive-element": "https://esm.sh/@lit/reactive-element@2.0.4",
          "@lit/reactive-element/": "https://esm.sh/@lit/reactive-element@2.0.4/",
          "lit-html": "https://esm.sh/lit-html@3.3.2",
          "lit-html/": "https://esm.sh/lit-html@3.3.2/",
          "@material/web/": "https://esm.sh/@material/web@2.4.1/",
          "friday-components/": "./components/"
        }
      }
    </script>
    <style>
      /* Material Design 3 – custom blue-purple seed colours */
      :root {
        --md-sys-color-primary: #5b5bd6;
        --md-sys-color-on-primary: #ffffff;
        --md-sys-color-primary-container: #e3dfff;
        --md-sys-color-on-primary-container: #120063;
        --md-sys-color-surface: #fdfbff;
        --md-sys-color-surface-container-low: #f3eff8;
        --md-sys-color-on-surface: #1c1b1f;
        --md-sys-color-on-surface-variant: #49454f;
        --md-sys-color-outline-variant: #cac4d0;
        --md-sys-color-error: #b3261e;
        --md-sys-color-error-container: #f9dedc;
        --md-sys-color-tertiary-container: #b6f2c8;
        --md-sys-color-on-tertiary-container: #072711;
        --md-ref-typeface-brand: 'Google Sans', Roboto, sans-serif;
        --md-ref-typeface-plain: Roboto, sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: var(--md-ref-typeface-plain);
        background:
          radial-gradient(ellipse 80% 60% at 20% -10%, #ede9fe 0%, transparent 60%),
          radial-gradient(ellipse 60% 50% at 90% 110%, #dbeafe 0%, transparent 55%),
          var(--md-sys-color-surface, #fdfbff);
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>
  <body>
    <friday-auth-page></friday-auth-page>
    <!--
      auth-page.ts is compiled to src/auth-page.js by the ts_project Bazel rule.
      It transitively imports friday-auth-card.js (via the import map) and the
      Material Web components (resolved to esm.sh by the import map).
    -->
    <script type="module" src="./src/auth-page.js"></script>
  </body>
</html>
