<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Friday component showcase</title>
        <script type="importmap">
            {
                "imports": {
                    "lit": "/static/lit.js",
                    "lit/decorators.js": "/static/lit-decorators.js"
                }
            }
        </script>
        <link rel="stylesheet" href="/static/common.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <script type="module" src="/static/components.js"></script>
        <script type="module">
            import { render } from "lit";
            import {
                BOT_MESSAGE_SQUARE,
                WORKFLOW,
            } from "/static/components.js";

            render(
                BOT_MESSAGE_SQUARE,
                document.querySelector("#new-task-icon"),
            );
            render(WORKFLOW, document.querySelector("#workflow-icon"));
        </script>
    </head>
    <body>
        <nav>
            <app-sidebar>
                <app-sidebar-nav-item target="/thread">
                    <span id="new-task-icon" slot="icon"></span>
                    New task
                </app-sidebar-nav-item>
                <app-sidebar-nav-item target="/thread">
                    <span id="workflow-icon" slot="icon"></span>
                    Automations
                </app-sidebar-nav-item>
                <app-sidebar-group title="Threads">
                    <li><a href="/threads/123">My thread...</a></li>
                    <li><a href="/threads/456">My thread 2...</a></li>
                </app-sidebar-group>
            </app-sidebar>
        </nav>
        <main>
            <header><app-sidebar-toggle></app-sidebar-toggle></header>
            <section class="content"></section>
            <app-prompt-input style="margin: 8px"></app-prompt-input>
        </main>
    </body>
</html>
