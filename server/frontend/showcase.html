<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Friday component showcase</title>
        <script type="importmap">
            {
                "imports": {
                    "lit": "/static/lit.js",
                    "lit/decorators.js": "/static/lit-decorators.js"
                }
            }
        </script>
        <link rel="stylesheet" href="/static/common.css" />
        <script type="module" src="/static/components.js"></script>
    </head>
    <body>
        <app-sidebar-provider>
            <app-sidebar collapsible="icon">

                <app-sidebar-header>
                    <app-sidebar-menu>
                        <app-sidebar-menu-item>
                            <app-sidebar-menu-button size="lg" href="#">
                                <span style="display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;background:#18181b;color:#fff;border-radius:0.375rem;flex-shrink:0">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                </span>
                                <span style="display:flex;flex-direction:column;line-height:1.2;overflow:hidden;min-width:0">
                                    <span style="font-weight:600;font-size:0.875rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Friday</span>
                                    <span style="font-size:0.75rem;opacity:0.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">AI Assistant</span>
                                </span>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="margin-left:auto;flex-shrink:0;opacity:0.6"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                            </app-sidebar-menu-button>
                        </app-sidebar-menu-item>
                    </app-sidebar-menu>
                </app-sidebar-header>

                <app-sidebar-content>
                    <app-sidebar-group>
                        <app-sidebar-group-label>Platform</app-sidebar-group-label>
                        <app-sidebar-group-content>
                            <app-sidebar-menu>
                                <app-sidebar-menu-item>
                                    <app-sidebar-menu-button tooltip="Home" href="#" active>
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                        <span>Home</span>
                                    </app-sidebar-menu-button>
                                </app-sidebar-menu-item>
                                <app-sidebar-menu-item>
                                    <app-sidebar-menu-button tooltip="Threads" href="#">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                        <span>Threads</span>
                                    </app-sidebar-menu-button>
                                </app-sidebar-menu-item>
                                <app-sidebar-menu-item>
                                    <app-sidebar-menu-button tooltip="Models" href="#">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
                                        <span>Models</span>
                                    </app-sidebar-menu-button>
                                </app-sidebar-menu-item>
                                <app-sidebar-menu-item>
                                    <app-sidebar-menu-button tooltip="Settings" href="#">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                                        <span>Settings</span>
                                    </app-sidebar-menu-button>
                                </app-sidebar-menu-item>
                            </app-sidebar-menu>
                        </app-sidebar-group-content>
                    </app-sidebar-group>
                </app-sidebar-content>

                <app-sidebar-footer>
                    <app-sidebar-menu>
                        <app-sidebar-menu-item>
                            <app-sidebar-menu-button size="lg" href="#">
                                <span style="display:inline-flex;align-items:center;justify-content:center;width:2rem;height:2rem;border-radius:50%;background:#e4e4e7;flex-shrink:0;font-weight:600;font-size:0.75rem">A</span>
                                <span style="display:flex;flex-direction:column;line-height:1.2;overflow:hidden;min-width:0">
                                    <span style="font-weight:500;font-size:0.875rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">Alex</span>
                                    <span style="font-size:0.75rem;opacity:0.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">alex@example.com</span>
                                </span>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="margin-left:auto;flex-shrink:0;opacity:0.6"><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></svg>
                            </app-sidebar-menu-button>
                        </app-sidebar-menu-item>
                    </app-sidebar-menu>
                </app-sidebar-footer>

                <app-sidebar-rail></app-sidebar-rail>
            </app-sidebar>

            <app-sidebar-inset>
                <header style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;border-bottom:1px solid var(--sidebar-border,hsl(220 13% 91%));flex-shrink:0">
                    <app-sidebar-trigger></app-sidebar-trigger>
                    <span style="font-size:0.875rem;font-weight:500">Friday</span>
                </header>
                <main style="padding:1rem;font-size:0.875rem;color:var(--muted-foreground,#71717a)">
                    Select a conversation from the sidebar.
                </main>
            </app-sidebar-inset>
        </app-sidebar-provider>
    </body>
</html>
