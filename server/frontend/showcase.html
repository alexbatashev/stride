<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Friday component showcase</title>
        <link rel="stylesheet" href="/static/common.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <script type="module" src="/static/components.js"></script>
    </head>
    <body>
        <nav>
            <app-sidebar
                data-active-thread="123"
                data-projects='[{"id":"p1","title":"My project","threads":[{"id":"123","title":"My thread..."}]}]'
                data-threads='[{"id":"456","title":"My thread 2..."}]'
            ></app-sidebar>
        </nav>
        <main>
            <header><app-sidebar-toggle></app-sidebar-toggle></header>
            <section class="content">
                <div class="wrapper">
                    <app-message
                        data-message-id="1"
                        data-kind="user"
                        data-text="What can you do?"
                    ></app-message>
                    <app-message
                        data-message-id="2"
                        data-kind="agent"
                        data-thinking="User asked a question..."
                        data-tool-name="My cool tool"
                        data-text="Lorem ipsum dolor sit amet **consectetur** adipiscing elit. Quisque faucibus ex sapien vitae pellentesque sem placerat. In id cursus mi pretium tellus duis convallis. Tempus leo eu aenean sed diam urna tempor. Pulvinar vivamus fringilla lacus nec metus bibendum egestas. Iaculis massa nisl malesuada lacinia integer nunc posuere. Ut hendrerit semper vel class aptent taciti sociosqu. Ad litora torquent per conubia nostra inceptos himenaeos."
                    ></app-message>
                    <app-message
                        data-message-id="3"
                        data-kind="tool_output"
                        data-tool-name="My cool tool"
                        data-text="Tool returned a showcase result."
                    ></app-message>
                </div>
            </section>
            <app-prompt-input style="margin: auto"></app-prompt-input>
            <app-approval-bar
                style="margin: auto"
                data-message="Friday wants to run a shell command. Allow?"
            ></app-approval-bar>
            <app-quiz-bar
                style="margin: auto"
                data-question="Which option should the showcase pick?"
                data-options='["Option A","Option B"]'
            ></app-quiz-bar>
        </main>
    </body>
</html>
