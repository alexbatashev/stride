[package]
name = "llm"
version = "0.1.0"
edition = "2024"

[dependencies]
async-stream = "0.3.6"
axum = {version = "0.8.9", features = ["http1"] }
bytes = "1.11.1"
futures = "0.3.32"
http-body-util = "0.1.3"
hyper = { version = "1.9.0", features = ["server", "client"] }
hyper-rustls = "0.27.9"
hyper-util = "0.1.20"
mio = { version = "1.2.0", features = ["os-poll", "net"] }
rustls = "0.23.38"
rustls-aws-lc-rs = "0.0.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
uuid = {version = "1.23.1", features = ["serde", "v4", "v7"] }
webpki-roots = "1.0.7"

[dev-dependencies]
insta = "1.47.2"
